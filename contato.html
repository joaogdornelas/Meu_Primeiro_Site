<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Aplicado Casa</title>
</head>
<body>
    
<h2>Quem esta tentando entrar em contato?</h2>
<p>Preencha este Formulario</p>
    
    
    <label for="Nome">Nome</label>
    <input type="text" name="Nome" id="nomepessoa" required>
    
    <br><br>
    
    <label for="Email">Email</label>
    <input type="email" name="email" id="email">
    
    <br><br>
    
    <label for="Telefone">Telefone</label>
    <input type="number" name="Telefone" id="contato" required>
    
    <br><br>
    
    <label for="textarea">Assunto<br/label>
    <textarea name="assuntotexto" id="Assunto"></textarea>
    
    <br><br>
    
    <label for="textarea">Mensagem<br/label>
    <textarea name="mensagem" id="msg"></textarea>
    
    <br><br>
    
    <label for="checkbox">Aceito os termos</label>
    <input type="checkbox" name="termos" id="aceitotermos"> 
    
    <br><br>
    
    <button type="submit">Enviar</button>
</body>
</html>
